<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Idle Cards</title>
  <link rel="stylesheet" href="styles/event-log.css">
</head>
<body>
  <div id="event-log"></div>

  <div id="hud">
    Energy: <span id="energy">0</span> |
    Passive: <span id="passive-rate">0</span> energy/s |
    Active: <span id="active-rate">0</span> energy/card
  </div>

  <div id="deck-picker">
    <select id="deck-select"><option>Loading...</option></select>
    <button id="start-btn">Start Review</button>
  </div>

  <div id="review" hidden>
    <p id="queue-status"></p>
    <button id="end-btn">End Review</button>
    <div id="card-front"></div>
    <button id="show-answer-btn">Show Answer</button>
    <div id="card-back" hidden></div>
    <div id="rating-buttons" hidden>
      <button data-ease="1">Again</button>
      <button data-ease="2">Hard</button>
      <button data-ease="3">Good</button>
      <button data-ease="4">Easy</button>
    </div>
  </div>

  <div id="done" hidden>
    <p>Deck complete!</p>
  </div>

  <button id="reset-btn">Reset Save</button>

  <script type="module" src="main.js"></script>
</body>
</html>
